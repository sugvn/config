set -g mouse on
set -g base-index 1
set-option -a terminal-features 'foot:RGB'
set-option -g automatic-rename off
set-option -g focus-events on
unbind C-b
set -g prefix M-e
bind M-e send-prefix

bind-key -n M-\; command-prompt
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-Tab last-window

bind r command-prompt "rename-window '%%'"
bind R command-prompt "rename-session '%%'"
bind d detach-client
bind x kill-pane
bind q kill-window
bind s choose-tree
bind \\ split-window -h
bind - split-window -v
bind n new-window

set -g status-right ""
set -g status-left ""
set -g status-style bg=default

set -g window-status-format " #I:#W "
set -g window-status-style fg=#6e6a86,bg=default
set -g window-status-current-format " #I:#W*"
set -g window-status-current-style fg=#ffffff,bg=default

set -g pane-border-style fg=#6e6a86
set -g pane-active-border-style fg=#9ccfd8

set -g message-style bg=default
set -g message-command-style bg=default
set -g window-style bg=default
set -g window-active-style bg=default
